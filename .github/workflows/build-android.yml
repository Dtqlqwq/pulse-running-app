name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js环境
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 安装依赖
      run: |
        npm ci --legacy-peer-deps
        # 检查Capacitor依赖是否已安装，避免重复安装
        if ! npm list @capacitor/core 2>/dev/null | grep -q "@capacitor/core"; then
          echo "安装Capacitor依赖..."
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/geolocation
        else
          echo "✅ Capacitor依赖已安装"
        fi

    - name: 检查Capacitor配置
      run: |
        if [ -f "capacitor.config.ts" ]; then
          echo "✅ 使用现有的capacitor.config.ts文件"
        else
          echo "⚠  未找到capacitor.config.ts，创建默认配置"
          echo 'export default {
            appId: "com.pacex.app",
            appName: "Pulse - 跑步追踪",
            webDir: "dist",
            server: { androidScheme: "https" },
            plugins: { Geolocation: { enableHighAccuracy: true } }
          };' > capacitor.config.ts
        fi

    - name: 设置Supabase环境变量
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        # 创建.env.local文件（项目实际使用的文件）
        echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env.local
        echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env.local
        echo "✅ 环境变量已设置到.env.local"

    - name: 构建Web应用
      run: npm run build

    - name: 管理Android平台
      run: |
        if [ -d "android" ]; then
          echo "删除旧的Android平台重新初始化..."
          rm -rf android
        fi
        echo "添加Android平台..."
        npx cap add android
    - name: 增量更新Android权限配置
      run: |
        echo "🔧 运行增量权限更新脚本..."
        chmod +x .github/scripts/update-android-permissions.sh
        ./.github/scripts/update-android-permissions.sh

    - name: 同步到Android项目
      run: npx cap sync android

    - name: 设置Java环境
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 缓存Gradle依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 构建调试版APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 上传APK文件
      uses: actions/upload-artifact@v4
      with:
        name: pulse-app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: 显示下载说明
      run: |
        echo "✅ APK构建成功！"
        echo "📱 下载链接将在工作流完成后出现在Artifacts区域"
        echo "🔧 如需发布版APK，请配置签名密钥后重新运行"

    - name: 清理工作
      if: always()
      run: |
        echo "🧹 清理临时文件..."
        rm -f .env.local
        echo "✅ 临时文件已清理"
